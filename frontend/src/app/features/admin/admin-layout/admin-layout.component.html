<div class="admin-shell">
  <aside class="admin-sidebar">
    <div>
      <div class="brand-mark">Commerce Admin</div>
      <p class="sidebar-caption mb-0">DB tabanli yonetim paneli</p>
    </div>

    <nav class="nav flex-column gap-2 mt-4">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-link">Kullanicilar</a>
      <a routerLink="/admin/categories" routerLinkActive="active" class="nav-link">Kategoriler</a>
      <a routerLink="/admin/products" routerLinkActive="active" class="nav-link">Urunler</a>
      <a routerLink="/admin/orders" routerLinkActive="active" class="nav-link">Siparisler</a>
      <a routerLink="/admin/order-items" routerLinkActive="active" class="nav-link">Siparis Kalemleri</a>
      <a routerLink="/admin/reviews" routerLinkActive="active" class="nav-link">Yorumlar</a>
    </nav>

    <div class="sidebar-footer mt-auto pt-4">
      <div class="small text-uppercase text-white-50">Giris yapan</div>
      <div class="fw-semibold mb-3">{{ adminEmail }}</div>
      <button type="button" class="btn btn-light w-100" (click)="logout()">Cikis Yap</button>
    </div>
  </aside>

  <main class="admin-content">
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
          <p class="text-muted mb-1">Yonetim Merkezi</p>
          <h1 class="h4 mb-0">Admin Paneli</h1>
        </div>
        <span class="badge text-bg-success px-3 py-2">Live DB</span>
      </div>
    </div>

    <router-outlet></router-outlet>
  </main>
</div>
