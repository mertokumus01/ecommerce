 <!-- Toast Notifications -->
    <app-toast></app-toast>

    <!-- Minimal Sticky Navigation -->
    <nav class="navbar-minimal">
      <div class="navbar-content">
        <a routerLink="/" class="navbar-logo">
          <span class="logo-text">SatışHub</span>
        </a>
        
        <ul class="navbar-menu">
          <li><a routerLink="/" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{exact: true}">AnaSayfa</a></li>
          <li><a routerLink="/products" [routerLinkActive]="'active'">Ürünler</a></li>
          <li><a routerLink="/cart" [routerLinkActive]="'active'">Sepet</a></li>
          <li class="menu-divider"></li>

          <ng-container *ngIf="!isLoggedIn; else userMenuTemplate">
            <li><a routerLink="/auth/login" class="btn-minimal">Giriş</a></li>
            <li><a routerLink="/auth/register" class="btn-minimal-primary">Kayıt</a></li>
          </ng-container>

          <ng-template #userMenuTemplate>
            <li class="user-menu-wrapper" (click)="$event.stopPropagation()">
              <button type="button" class="btn-minimal-primary user-menu-button" (click)="toggleUserMenu($event)">
                {{ currentUserName || currentUserEmail || 'Hesabım' }}
              </button>
              <div class="user-dropdown" *ngIf="showUserMenu">
                <button type="button" (click)="goProfile()">Kullanıcı Profili</button>
                <button type="button" class="logout-btn" (click)="logout()">Çıkış Yap</button>
              </div>
            </li>
          </ng-template>
          <li *ngIf="isLoggedIn" class="cart-menu-wrapper">
            <button type="button" class="btn-cart" (click)="toggleCartPreview()">
              🛒 <span class="cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
            </button>
          </li>
        </ul>

        <button class="menu-toggle" (click)="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

    <!-- Cart Preview Modal -->
    <app-cart-preview 
      [isOpen]="showCartPreview" 
      [orderId]="cartOrderId"
      (close)="showCartPreview = false"
    ></app-cart-preview>

    <!-- Minimal Footer -->
    <footer class="footer-minimal">
      <div class="footer-content">
        <div class="footer-grid">
          <div class="footer-col">
            <h4>SatışHub</h4>
            <p>Premium ürünler, en iyi fiyatlar.</p>
          </div>
          <div class="footer-col">
            <h5>Menü</h5>
            <ul>
              <li><a href="#">Ürünler</a></li>
              <li><a href="#">Hakkında</a></li>
              <li><a href="#">İletişim</a></li>
            </ul>
          </div>
          <div class="footer-col">
            <h5>Yasal</h5>
            <ul>
              <li><a href="#">Gizlilik</a></li>
              <li><a href="#">Şartlar</a></li>
              <li><a href="#">Cookies</a></li>
            </ul>
          </div>
          <div class="footer-col">
            <h5>Bağlantı</h5>
            <ul>
              <li><a href="#">Twitter</a></li>
              <li><a href="#">Instagram</a></li>
              <li><a href="https://www.linkedin.com/in/mert-okumu%C5%9F-474a89370/" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
            </ul>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2026 SatışHub. Tüm hakları saklıdır.</p>
        </div>
      </div>
    </footer>
