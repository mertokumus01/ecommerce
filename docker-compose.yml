services:
  # Oracle Database
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: ecommerce-oracle
    environment:
      ORACLE_PASSWORD: oracle123
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./docker/oracle-init:/opt/oracle/scripts/startup
    networks:
      - ecommerce-network
    healthcheck:
      test: [ "CMD", "sqlplus", "-L", "sys/oracle123@localhost:1521/XEPDB1", "as", "sysdba" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ecommerce-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: ECOMMERCEAPI
      SPRING_DATASOURCE_PASSWORD: ecommerce123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_PROFILES_ACTIVE: production
      SERVER_SERVLET_CONTEXT_PATH: /api
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # Frontend Web Server
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ecommerce-web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    environment:
      - NGINX_HOST=ecommerce.local
      - NGINX_PORT=80

  # Optional: pgAdmin-like tool for Oracle (if needed in future)
  # adminer:
  #   image: adminer
  #   container_name: ecommerce-adminer
  #   ports:
  #     - "8081:8080"
  #   depends_on:
  #     - oracle
  #   networks:
  #     - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  oracle_data:
    driver: local
